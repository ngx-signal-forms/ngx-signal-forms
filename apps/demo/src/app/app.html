<!-- Application Shell -->
<div
  class="min-h-screen bg-white text-gray-900 dark:bg-gray-950 dark:text-gray-100"
>
  <a
    href="#maincontent"
    class="sr-only focus:not-sr-only focus:fixed focus:top-6 focus:left-6 focus:z-50 focus:rounded focus:bg-white focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-gray-900 focus:shadow focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:outline-none dark:focus:bg-gray-900 dark:focus:text-gray-100 dark:focus:ring-purple-400 dark:focus:ring-offset-gray-950"
  >
    Skip to main content
  </a>
  <!-- Top Bar - Full Width -->
  <header
    class="app-shell__header w-full text-gray-800 dark:text-white"
    [class.app-shell__header--scrolled]="scrolled()"
  >
    <div class="app-shell__header-bar flex h-16">
      <!-- Brand Section - Matches sidebar width -->
      <div class="app-shell__brand-rail flex items-center">
        <a
          [routerLink]="'/getting-started/your-first-form'"
          class="brand-gradient inline-block text-2xl leading-none font-bold tracking-tight whitespace-nowrap focus:outline-none focus-visible:ring-2 focus-visible:ring-purple-500/50"
        >
          ngx-signal-forms
        </a>
      </div>

      <!-- Navigation Section - Aligned with main content -->
      <div
        class="app-shell__header-main flex flex-1 items-stretch"
        [class.app-shell__header-main--scrolled]="scrolled()"
      >
        <div class="app-shell__topnav flex flex-1 items-center justify-start">
          <nav
            class="hidden flex-nowrap items-center gap-8 text-sm md:flex"
            aria-label="Primary navigation"
          >
            @for (category of categoriesList; track category.id) {
            <a
              [routerLink]="['/', category.id]"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: false }"
              #rla="routerLinkActive"
              class="nav-grad-link whitespace-nowrap"
              [class.active]="rla.isActive"
            >
              {{ category.label }}
            </a>
            }
          </nav>
        </div>

        <!-- Theme Switcher - Right aligned -->
        <div class="app-shell__theme-slot flex flex-1 items-center justify-end">
          <ngx-theme-switcher></ngx-theme-switcher>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Layout -->
  <div
    class="flex h-[calc(100vh-4rem)] min-h-[calc(100vh-4rem)] overflow-hidden"
  >
    <!-- Sidebar -->
    <aside class="app-shell__sidebar text-gray-800 dark:text-white">
      <div class="flex h-full flex-col">
        <div>
          <h3
            class="app-shell__sidebar-title brand-gradient font-semibold uppercase"
          >
            {{ currentCategory().label }}
          </h3>
          <nav
            aria-label="Section navigation"
            class="app-shell__section-nav flex flex-col text-sm"
          >
            @for (link of currentCategoryLinks(); track link.path) {
            <a
              [routerLink]="link.path"
              #rla="routerLinkActive"
              routerLinkActive="active"
              class="nav-grad-link app-shell__section-link"
              [class.active]="rla.isActive"
            >
              {{ link.label }}
            </a>
            }
          </nav>
        </div>
        <div
          class="app-shell__sidebar-footer mt-auto flex items-center justify-start text-purple-600 dark:text-purple-200"
        >
          <a
            href="https://angular.dev/api/forms/signals"
            target="_blank"
            rel="noopener"
            aria-label="Angular Signal Forms API"
            class="inline-flex items-center transition-colors hover:text-purple-900 dark:hover:text-white"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              class="h-4 w-4"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M9.931 12.645h4.138l-2.07-4.908m0-7.737L.68 3.982l1.726 14.771L12 24l9.596-5.242L23.32 3.982zM12 2.882l8.458 18.816h-3.153L16.28 16.1H7.672l-1.996 4.287H2.522z"
              />
            </svg>
          </a>
          <a
            href="https://github.com/ngx-signal-forms/ngx-signal-forms"
            target="_blank"
            rel="noopener"
            aria-label="GitHub Repository"
            class="inline-flex items-center transition-colors hover:text-purple-900 dark:hover:text-white"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              class="h-4 w-4"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.6.111.793-.261.793-.577 0-.285-.011-1.04-.016-2.04-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.776.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.932 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.984-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.652.242 2.873.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.92.43.372.823 1.102.823 2.222 0 1.606-.014 2.898-.014 3.293 0 .319.192.694.801.576C20.566 21.796 24 17.3 24 12c0-6.627-5.373-12-12-12z"
              />
            </svg>
          </a>
          <a
            href="https://github.com/ngx-signal-forms/ngx-signal-forms/tree/main/packages/toolkit"
            target="_blank"
            rel="noopener"
            aria-label="Toolkit documentation"
            class="inline-flex h-4 items-center font-mono text-[11px] font-semibold tracking-wide transition-colors hover:text-purple-900 dark:hover:text-white"
          >
            <span aria-hidden="true">TK</span>
          </a>
          <a
            href="https://bsky.app/profile/arzy.dev"
            target="_blank"
            rel="noopener"
            aria-label="Bluesky"
            class="inline-flex items-center transition-colors hover:text-purple-900 dark:hover:text-white"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              class="h-4 w-4"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 0 1-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.206-.659-.298-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8Z"
              />
            </svg>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main
      id="maincontent"
      tabindex="-1"
      class="app-shell__main flex-1 overflow-hidden rounded-tl-3xl bg-gradient-to-tr from-blue-100 via-purple-50 to-indigo-200 dark:bg-gradient-to-tr dark:from-gray-900 dark:via-blue-950 dark:to-indigo-900"
    >
      <div
        class="app-shell__main-scroll p-6 lg:p-8"
        [class.app-shell__main-scroll--scrolled]="scrolled()"
        #mainScroll
        (scroll)="handleMainScroll()"
      >
        <div class="page-wrapper">
          <div class="min-h-0">
            <router-outlet></router-outlet>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
