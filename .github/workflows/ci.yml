name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      skip_cloud:
        description: 'Skip Nx Cloud (use when cloud auth, plan, or service is failing)'
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

# Cancel superseded runs on the same branch/PR - every other push/PR/tag
# workflow in this repo already does this (deploy-demo, publish, release,
# update-snapshots); ci.yml was the one gap. Saves both GH Actions minutes
# and Nx Cloud credits when a branch is pushed to repeatedly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    # Broad PRs that touch shared libs make nearly every project "affected"
    # (4 demo e2e suites + toolkit browser tests), which can exceed 20 min.
    timeout-minutes: 35
    env:
      # https://nx.dev/docs/features/ci-features/distribute-task-execution
      NX_CLOUD_CONTINUOUS_ASSIGNMENT: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Configure Nx Cloud access
        id: nx_cloud
        env:
          NX_CLOUD_ACCESS_TOKEN_RW: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RW'] }}
          NX_CLOUD_ACCESS_TOKEN_RO: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RO'] }}
        run: |
          if [ "${{ inputs.skip_cloud }}" = "true" ]; then
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Nx Cloud disabled via workflow input."
            exit 0
          fi

          TOKEN=""

          if [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$NX_CLOUD_ACCESS_TOKEN_RW" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RW"
          elif [ -n "$NX_CLOUD_ACCESS_TOKEN_RO" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RO"
          fi

          if [ -n "$TOKEN" ]; then
            echo "NX_CLOUD_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "NX_NO_CLOUD=false" >> "$GITHUB_ENV"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Nx Cloud enabled."
          else
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No Nx Cloud token configured. Running without Nx Cloud."
          fi

      # Set BASE/HEAD for affected commands; continue if the helper cannot resolve SHAs
      - uses: nrwl/nx-set-shas@v5
        continue-on-error: true

      # Nx Agents (DTE): must run before any other `nx`/`nx-cloud` command -
      # the first command to reach Nx Cloud locks in the CI Pipeline
      # Execution's distribution settings for the whole run.
      # https://nx.dev/docs/features/ci-features/distribute-task-execution
      #
      # Agent count scales with the affected-project percentage of the PR via
      # .nx/workflows/distribution-config.yaml (small/medium/large changesets)
      # so trivial PRs use 2 agents while broad, multi-app PRs scale to 6.
      # --stop-agents-after lists every target run below so agents don't shut
      # down while dependent tasks (test-browser/e2e-ci depending on build)
      # are still in flight.
      #
      # Fork PRs never receive NX_CLOUD_ACCESS_TOKEN_* secrets on the
      # `pull_request` trigger (this repo intentionally never uses
      # `pull_request_target` for untrusted code), so nx_cloud.enabled is
      # already 'false' for them. The fork check below is defense-in-depth
      # only, in case that trigger or secrets policy ever changes.
      - name: Start Nx Cloud distributed task execution
        id: nx_agents
        if: steps.nx_cloud.outputs.enabled == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        # Never hard-block CI on Nx Cloud/agents being unavailable; the
        # affected-tasks step below falls back to local execution via
        # nx-safe.sh if Nx Cloud rejects the workspace.
        continue-on-error: true
        run: |
          pnpm exec nx-cloud start-ci-run \
            --distribute-on=".nx/workflows/distribution-config.yaml" \
            --stop-agents-after="lint,test,test-browser,build,e2e-ci"

      - name: Nx Report
        # nx-safe.sh keeps diagnostics available even if Nx Cloud auth is broken.
        run: bash .github/scripts/nx-safe.sh pnpm exec nx report

      - name: Check formatting
        env:
          NX_NO_CLOUD: 'true'
          NX_DAEMON: 'false'
        run: bash .github/scripts/nx-safe.sh pnpm run format:check

      - name: Lint with GitHub annotations
        if: ${{ always() }}
        run: pnpm exec oxlint . --format=github
        continue-on-error: true

      # Keep the critical path focused on fast checks + smaller e2e suites.
      # The heavy demo-e2e suite is sharded in a separate parallel job.
      - name: Run affected tasks (excluding demo-e2e)
        run: bash .github/scripts/nx-safe.sh pnpm exec nx affected -t lint test test-browser build e2e-ci --exclude=demo-e2e --parallel=4 --outputStyle=static

      - name: Generate lint report
        if: ${{ always() }}
        run: pnpm exec oxlint . --format=json > lint-report.json || true

      - name: Upload test and lint artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/*-e2e/playwright-report/
            dist/.playwright/apps/*-e2e/test-output/
            coverage/packages/toolkit/browser/
            lint-report.json
          if-no-files-found: ignore
          retention-days: 14

      # https://nx.dev/ci/features/self-healing-ci
      # continue-on-error: fix-ci requires Nx Cloud, may fail if quota exceeded
      - run: pnpm exec nx fix-ci --outputStyle=static
        if: ${{ always() && !inputs.skip_cloud && steps.nx_cloud.outputs.enabled == 'true' && env.NX_NO_CLOUD != 'true' }}
        continue-on-error: true

  demo-e2e-sharded:
    name: Demo E2E (sharded)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard-index: [1, 2, 3, 4]
    env:
      NX_DAEMON: 'false'
      SHARD_TOTAL: '4'
      PW_WORKERS: '2'
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run demo-e2e shard
        env:
          SHARD_INDEX: ${{ matrix.shard-index }}
        run: bash .github/scripts/nx-safe.sh pnpm exec nx run demo-e2e:e2e-ci-shard --outputStyle=static

      - name: Upload demo-e2e shard artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: demo-e2e-shard-${{ matrix.shard-index }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            apps/demo-e2e/playwright-report/
            dist/.playwright/apps/demo-e2e/test-output/
          if-no-files-found: ignore
          retention-days: 14

  # Proves the published toolkit stays design-system-free as the reference
  # demo apps (#40 - Material/PrimeNG/Spartan) land. Two assertions:
  #   1. Static: toolkit's own package.json declares no design-system deps.
  #   2. Runtime: `nx build toolkit` succeeds in a workspace pruned to
  #      toolkit + its transitive deps via `pnpm install --filter`, so even
  #      if a future demo app pulls in @angular/material et al., none of
  #      those packages are present in node_modules during the toolkit build.
  toolkit-isolation:
    name: Toolkit isolation (design-system-free build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NX_NO_CLOUD: 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 1
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Assert toolkit declares no design-system deps
        run: pnpm check:toolkit-peer-deps

      - name: Install only toolkit + its dependencies
        # `--filter "@ngx-signal-forms/toolkit..."` includes the toolkit and
        # its transitive workspace deps but excludes apps/demo* and any
        # future demo apps that depend on the toolkit. Demo design-system
        # deps therefore never enter node_modules in this job.
        run: pnpm install --frozen-lockfile --filter "@ngx-signal-forms/toolkit..."

      - name: Build toolkit
        run: pnpm exec nx build toolkit

  # WCAG 2.2 AA accessibility scan of the demo apps. Runs in parallel with the
  # main job and is intentionally NON-BLOCKING (continue-on-error): demo apps
  # showcase the toolkit and may inherit violations from page scaffolding or
  # third-party UI layers, so they are tracked against a per-app baseline rather
  # than gated. The toolkit's own WCAG conformance is a hard gate in the main
  # job's `test-browser` task. On pull requests this job only reports new
  # violations; on push to main it opens a GitHub issue per new violation.
  a11y:
    name: Accessibility (WCAG 2.2 AA demo scan)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    env:
      NX_NO_CLOUD: 'true'
      NX_DAEMON: 'false'
    steps:
      - uses: actions/checkout@v7
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Both engines: the scan runs in Chromium + Firefox for cross-engine
      # accessibility coverage of the last-2-versions browser policy.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium firefox
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - uses: nrwl/nx-set-shas@v5
        continue-on-error: true

      # PRs: only the affected demo apps, for fast feedback.
      - name: Scan affected demo apps (pull request)
        if: ${{ github.event_name == 'pull_request' }}
        run: pnpm exec nx affected -t a11y --parallel=2 --outputStyle=static

      # main: every demo app, so issue creation sees the full picture.
      - name: Scan all demo apps (push)
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm exec nx run-many -t a11y --parallel=2 --outputStyle=static

      # PRs: report new violations for visibility (job is non-blocking).
      - name: Report new violations (pull request)
        if: ${{ github.event_name == 'pull_request' && !cancelled() }}
        run: node tools/scripts/a11y-report-violations.mjs --check

      # main: ensure the triage label exists, then open an issue per new
      # violation (deduped by title inside the script).
      - name: Open issues for new violations (push)
        if: ${{ github.event_name != 'pull_request' && !cancelled() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create a11y --color 1d76db --description "Accessibility (WCAG) issue" --force
          node tools/scripts/a11y-report-violations.mjs --create-issues

      - name: Upload a11y artifacts
        if: ${{ always() && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: a11y-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            dist/.a11y/
            apps/*/playwright-report/
          if-no-files-found: ignore
          retention-days: 14
