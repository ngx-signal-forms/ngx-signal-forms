name: Deploy Demo

on:
  push:
    branches:
      - main
    paths:
      - 'apps/demo/**'
      - 'packages/toolkit/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          filter: tree:0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Nx Cloud access
        env:
          NX_CLOUD_ACCESS_TOKEN_RW: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_RW }}
          NX_CLOUD_ACCESS_TOKEN_RO: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_RO }}
        run: |
          TOKEN=""
          if [ -n "$NX_CLOUD_ACCESS_TOKEN_RW" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RW"
          elif [ -n "$NX_CLOUD_ACCESS_TOKEN_RO" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RO"
          fi

          if [ -n "$TOKEN" ]; then
            echo "NX_CLOUD_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "NX_NO_CLOUD=false" >> "$GITHUB_ENV"
          else
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
            echo "No Nx Cloud token configured. Running without Nx Cloud."
          fi

      - name: Build Demo
        # nx-safe.sh retries locally if Nx Cloud rejects workspace authorization.
        run: bash .github/scripts/nx-safe.sh pnpm exec nx run demo:build --configuration=production --baseHref=/ngx-signal-forms/

      - name: Create 404.html for SPA routing
        run: cp dist/apps/demo/browser/index.html dist/apps/demo/browser/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The application builder output is usually in a 'browser' subdirectory
          path: dist/apps/demo/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
