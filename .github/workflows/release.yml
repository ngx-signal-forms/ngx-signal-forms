name: Release

# Manually create versioned releases with changelog and git tags
# Publishing is intentionally handled by the separate Publish workflow.
#
# Release types:
#   - patch/minor/major: Stable releases → npm tag: latest
#   - prerelease --preid=beta: Beta releases → npm tag: beta (e.g., 1.0.0-beta.1)
#   - prerelease --preid=rc: Release candidates → npm tag: rc (e.g., 1.0.0-rc.1)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type or exact version'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
          - custom
      custom_version:
        description: 'Custom version (only if "custom" is selected)'
        required: false
        type: string
      prerelease_id:
        description: 'Prerelease identifier (for pre* versions)'
        required: false
        type: choice
        default: 'beta'
        options:
          - beta
          - rc
          - alpha
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false
      first_release:
        description: 'Treat as first Nx-managed release (uses --first-release)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          filter: tree:0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Configure Nx Cloud access
        env:
          NX_CLOUD_ACCESS_TOKEN_RW: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RW'] }}
          NX_CLOUD_ACCESS_TOKEN_RO: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RO'] }}
        run: |
          TOKEN="$NX_CLOUD_ACCESS_TOKEN_RW"
          if [ -z "$TOKEN" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RO"
          fi

          if [ -n "$TOKEN" ]; then
            echo "NX_CLOUD_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "NX_NO_CLOUD=false" >> "$GITHUB_ENV"
            echo "Nx Cloud enabled for release workflow."
          else
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
            echo "No Nx Cloud token configured. Running release workflow without Nx Cloud."
          fi

      - uses: nrwl/nx-set-shas@v4
        continue-on-error: true

      - name: Nx Report
        run: pnpm exec nx report --outputStyle=static

      - name: Check formatting
        run: bash .github/scripts/nx-safe.sh pnpm run format:check

      - name: Verify Quality (Lint, Test, Build, E2E)
        # Using affected ensures we only verify what changed, but caching handles the rest.
        # We target all projects to ensure workspace health before release.
        # nx-safe.sh falls back to local execution if Nx Cloud rejects our token.
        run: bash .github/scripts/nx-safe.sh pnpm exec nx affected -t lint test test-browser build e2e-ci --outputStyle=static

      - name: Validate release inputs
        env:
          VERSION: ${{ inputs.version }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
          PRERELEASE_ID: ${{ inputs.prerelease_id }}
        run: |
          if [[ "$VERSION" == pre* ]] && [[ ! "$PRERELEASE_ID" =~ ^(beta|rc|alpha)$ ]]; then
            echo "❌ prerelease_id must be one of: beta, rc, alpha." >&2
            exit 1
          fi

          if [ "$VERSION" = "custom" ]; then
            if [ -z "$CUSTOM_VERSION" ]; then
              echo "❌ custom_version is required when version=custom." >&2
              exit 1
            fi

            if [[ ! "$CUSTOM_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "❌ custom_version must be a valid semver-like version such as 1.2.3 or 1.2.3-beta.1." >&2
              exit 1
            fi
          fi

      - name: Determine version command
        id: version_cmd
        run: |
          VERSION="${{ inputs.version }}"
          if [ "$VERSION" = "custom" ]; then
            printf 'cmd=%s\n' "${{ inputs.custom_version }}" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == pre* ]]; then
            # prepatch, preminor, premajor, prerelease all use --preid
            printf 'cmd=%s --preid=%s\n' "$VERSION" "${{ inputs.prerelease_id }}" >> "$GITHUB_OUTPUT"
          else
            printf 'cmd=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine first-release flag
        id: first_release_flag
        run: |
          if [ "${{ inputs.first_release }}" = "true" ]; then
            printf 'flag=%s\n' '--first-release' >> "$GITHUB_OUTPUT"
          else
            printf 'flag=\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Preview Release Changelog
        run: |
          echo "## 📋 Release Preview" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Running: \`nx release ${{ steps.version_cmd.outputs.cmd }} --skip-publish --dry-run ${{ steps.first_release_flag.outputs.flag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pnpm exec nx release ${{ steps.version_cmd.outputs.cmd }} --skip-publish --dry-run ${{ steps.first_release_flag.outputs.flag }} > /tmp/release-preview.txt 2>&1 || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          head -100 /tmp/release-preview.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (Dry Run)
        if: ${{ inputs.dry_run }}
        run: bash .github/scripts/nx-safe.sh pnpm exec nx release ${{ steps.version_cmd.outputs.cmd }} --skip-publish --dry-run ${{ steps.first_release_flag.outputs.flag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        if: ${{ !inputs.dry_run }}
        run: bash .github/scripts/nx-safe.sh pnpm exec nx release ${{ steps.version_cmd.outputs.cmd }} --skip-publish ${{ steps.first_release_flag.outputs.flag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve created release tag
        if: ${{ !inputs.dry_run }}
        id: release_info
        run: |
          git fetch --tags --force

          TAG=$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)
          if [ -z "$TAG" ]; then
            echo "❌ No release tag found after nx release" >&2
            git tag --list 'v*' --sort=-version:refname | head -5 >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG"

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version_cmd.outputs.cmd }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- First Release Mode: ${{ inputs.first_release }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "- Git Tag: ${{ steps.release_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
            echo "- Publish: run the separate Publish workflow with ref=${{ steps.release_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          fi
