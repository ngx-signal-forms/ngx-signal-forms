name: Publish

# Publish after a successful Release run or manually
# Uses npm Trusted Publishers (OIDC) - no secrets required!
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit SHA to publish (e.g. v1.0.0-beta.1)'
        required: true
        type: string
        default: 'v1.0.0-beta.1'
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # Required for npm Trusted Publishers (OIDC)

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      NX_CLOUD_ACCESS_TOKEN_RW: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RW'] }}
      NX_CLOUD_ACCESS_TOKEN_RO: ${{ secrets['NX_CLOUD_ACCESS_TOKEN_RO'] }}
    steps:
      - name: Resolve publish ref
        id: publish_ref
        run: |
          echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0
          ref: ${{ steps.publish_ref.outputs.ref }}

      - name: Resolve release tag and dist-tag
        id: release_info
        run: |
          git fetch --tags --force

          # Check if ref is already a tag
          if git rev-parse "${{ steps.publish_ref.outputs.ref }}^{tag}" >/dev/null 2>&1; then
            TAG="${{ steps.publish_ref.outputs.ref }}"
            echo "Using provided tag: $TAG"
          else
            # Find tag at the commit SHA
            REF_SHA=$(git rev-parse "${{ steps.publish_ref.outputs.ref }}")
            echo "Looking for tag at commit: $REF_SHA"
            TAG=$(git tag --points-at "$REF_SHA" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)

            if [ -z "$TAG" ]; then
              echo "❌ No release tag found at ref ${{ steps.publish_ref.outputs.ref }}" >&2
              echo "Only exact tagged refs are allowed for publish to avoid accidental wrong-version publishes." >&2
              echo "Available tags:" >&2
              git tag --list 'v*' --sort=-version:refname | head -5 >&2
              exit 1
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Determine npm dist-tag based on version
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *"-next"* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "dist_tag=beta" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-alpha"* ]]; then
            echo "dist_tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved: tag=$TAG, dist_tag will be determined by version"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@ngx-signal-forms'
          always-auth: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Nx Cloud access
        run: |
          TOKEN="$NX_CLOUD_ACCESS_TOKEN_RW"
          if [ -z "$TOKEN" ]; then
            TOKEN="$NX_CLOUD_ACCESS_TOKEN_RO"
          fi

          if [ -n "$TOKEN" ]; then
            echo "NX_CLOUD_ACCESS_TOKEN=$TOKEN" >> "$GITHUB_ENV"
            echo "NX_NO_CLOUD=false" >> "$GITHUB_ENV"
            echo "Nx Cloud enabled for publish workflow."
          else
            echo "NX_NO_CLOUD=true" >> "$GITHUB_ENV"
            echo "No Nx Cloud token configured. Running publish workflow without Nx Cloud."
          fi

      - name: Nx Report
        run: pnpm exec nx report --outputStyle=static

      - name: Build toolkit package
        run: pnpm exec nx run toolkit:post-build --skip-nx-cache --outputStyle=static

      - name: Validate npm trusted publishing preflight
        run: |
          npm --version
          pnpm --version
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "❌ OIDC token endpoint is not available in this job." >&2
            echo "Ensure workflow permissions include: id-token: write" >&2
            exit 1
          fi
          echo "OIDC is available for npm Trusted Publisher authentication."

      - name: Publish toolkit (Dry Run)
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "🔍 Dry run - would publish with tag: ${{ steps.release_info.outputs.dist_tag }}"
          npm publish dist/packages/toolkit --tag=${{ steps.release_info.outputs.dist_tag }} --access public --provenance --dry-run
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Publish toolkit
        if: ${{ inputs.dry_run != true }}
        run: |
          PACKAGE_NAME=$(node -p "require('./dist/packages/toolkit/package.json').name")
          PACKAGE_VERSION=$(node -p "require('./dist/packages/toolkit/package.json').version")
          DIST_TAG='${{ steps.release_info.outputs.dist_tag }}'

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version --json >/dev/null 2>&1; then
            echo "Version already exists. Updating dist-tag to '$DIST_TAG'."
            npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" "$DIST_TAG"
          else
            npm publish dist/packages/toolkit --tag="$DIST_TAG" --access public --provenance
          fi
        env:
          NPM_CONFIG_PROVENANCE: true
        # npm Trusted Publisher handles authentication automatically

      - name: Summary
        run: |
          echo "## Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Git Tag: ${{ steps.release_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- npm Dist Tag: ${{ steps.release_info.outputs.dist_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ inputs.dry_run || false }}" >> $GITHUB_STEP_SUMMARY
          echo "- Publish client: npm CLI" >> $GITHUB_STEP_SUMMARY
          echo "- Auth: npm Trusted Publishers (OIDC)" >> $GITHUB_STEP_SUMMARY
