name: Dependabot auto-merge

# Auto-approve and enable auto-merge for low-risk Dependabot PRs:
#   - any patch bump (incl. patch security fixes)
#   - any security fix (GHSA-tagged) that is not a major bump
#   - minor bumps for dev-dependencies and GitHub Actions
# Everything else (prod minors, all majors) stays manual.
#
# The actual merge is still gated by branch protection: `--auto` waits for the
# required CI checks to pass before merging. Requires two one-time repo settings:
#   1. Settings → General → Pull Requests → "Allow auto-merge" enabled.
#   2. Settings → Branches → protect `main`, requiring the "CI" status check.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Approve and enable auto-merge
        if: >-
          ${{
            steps.meta.outputs.update-type == 'version-update:semver-patch' ||
            (steps.meta.outputs.ghsa-id != '' &&
              steps.meta.outputs.update-type != 'version-update:semver-major') ||
            (steps.meta.outputs.update-type == 'version-update:semver-minor' &&
              (steps.meta.outputs.dependency-type == 'direct:development' ||
               steps.meta.outputs.ecosystem == 'github_actions'))
          }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
