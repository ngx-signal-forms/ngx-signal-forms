# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  contents: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - name: Run agent
        uses: pullfrog/pullfrog@816f9e82e961700c58ffb037e3b5fa74522f0423 # v0.1.35
        with:
          prompt: ${{ inputs.prompt }}
        # Provider keys live in the Pullfrog dashboard (encrypted).
        # To BYOK via GHA secrets instead, add a single env var here, e.g.:
        #   env:
        #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
