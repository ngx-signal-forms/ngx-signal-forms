# PULLFROG ACTION — DO NOT EDIT EXCEPT WHERE INDICATED
name: Pullfrog
run-name: ${{ inputs.name || github.workflow }}
on:
  workflow_dispatch:
    inputs:
      prompt:
        type: string
        description: Agent prompt
      name:
        type: string
        description: Run name

permissions:
  contents: read

jobs:
  pullfrog:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Run agent
        uses: pullfrog/pullfrog@fb22cb3ae3e85b594dc006e21e64dc58a091ca67 # v0.1.11
        with:
          prompt: ${{ inputs.prompt }}
        # Provider keys live in the Pullfrog dashboard (encrypted).
        # To BYOK via GHA secrets instead, add a single env var here, e.g.:
        #   env:
        #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
